let doneSet=new Set();
let currentFilter='all';
let timerSec=7200;
let timerInterval=null;

function pad(n){return n<10?'0'+n:n}
function startTimer(){
  timerInterval=setInterval(()=>{
    timerSec--;
    const h=Math.floor(timerSec/3600);
    const m=Math.floor((timerSec%3600)/60);
    const s=timerSec%60;
    const el=document.getElementById('timer');
    el.textContent=pad(h)+':'+pad(m)+':'+pad(s);
    if(timerSec<=600){el.style.color='var(--color-text-danger)';el.style.background='var(--color-background-danger)';}
    else if(timerSec<=1800){el.style.color='var(--color-text-warning)';el.style.background='var(--color-background-warning)';}
    if(timerSec<=0){clearInterval(timerInterval);el.textContent='Time up!';}
  },1000);
}

function filterUnit(uid,btn){
  currentFilter=uid;
  document.querySelectorAll('.uBtn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.querySelectorAll('.unit-block').forEach(u=>{
    u.style.display=(uid==='all'||u.dataset.unit===uid)?'block':'none';
  });
}

function toggleBody(tid){
  const body=document.getElementById('body-'+tid);
  const isOpen=body.classList.contains('open');
  if(isOpen){body.classList.remove('open');}
  else{body.classList.add('open');}
}

function markRead(tid){
  doneSet.add(tid);
  const btn=document.getElementById('markbtn-'+tid);
  const chk=document.getElementById('chk-'+tid);
  btn.textContent='Marked as read';
  btn.classList.add('done');
  chk.classList.add('checked');
  const total=22;
  const done=doneSet.size;
  document.getElementById('prog-count').textContent=done+' / '+total+' done';
  if(done===total){document.getElementById('all-done').style.display='block';}
}

function build(){
  const area=document.getElementById('content-area');
  UNITS.forEach(u=>{
    const div=document.createElement('div');
    div.className='unit-block';
    div.dataset.unit=u.id;
    let html=`<div class="card">
      <div class="unit-header" style="border-left:3px solid ${u.accent};padding-left:12px">
        <div class="uh-label">${u.num}</div>
        <div class="uh-title">${u.title}</div>
      </div>`;
    u.topics.forEach(t=>{
      html+=`<div class="topic-block">
        <div class="topic-head" onclick="toggleBody('${t.id}')">
          <div class="topic-name">${t.name}</div>
          <div class="t-meta">
            <span class="imp" style="color:${u.accent}">${t.imp}</span>
            <div class="chk" id="chk-${t.id}"><i class="ti ti-check" aria-hidden="true"></i></div>
          </div>
        </div>
        <div class="topic-body" id="body-${t.id}">`;
      t.sections.forEach(sec=>{
        html+=`<div class="sec"><div class="sec-label">${sec.label}</div>`;
        if(sec.note){html+=`<div class="note-box ${sec.note.cls}">${sec.note.text}</div>`;}
        if(sec.pts&&sec.pts.length>0){html+=`<ul class="list-pts">${sec.pts.map(p=>`<li>${p}</li>`).join('')}</ul>`;}
        if(sec.pills){html+=`<div class="pill-row">${sec.pills.map(p=>`<span class="pill ${p.cls}">${p.t}</span>`).join('')}</div>`;}
        html+=`</div>`;
      });
      html+=`<button class="mark-read-btn" id="markbtn-${t.id}" onclick="markRead('${t.id}')">Mark as read</button>`;
      html+=`</div></div>`;
    });
    html+=`</div>`;
    div.innerHTML=html;
    area.appendChild(div);
  });
}

build();
startTimer();
</script>
